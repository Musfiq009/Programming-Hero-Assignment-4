<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Job Application Traker</title>
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-base-200">
    <header class="max-w-5xl mx-auto space-y-5">
      <h1 class="text-3xl font-bold text-[#002C5C]">Job Application Tracker</h1>
      <div class="flex gap-4">
          <div class="w-full max-w-80 bg-base-100 shadow-2xs px-5 py-5">
          <p class="text-[14px] font-medium text-[#323B49]">Total</p>
          <h3 class="text-2xl font-bold text-[#002C5C]">8</h3>
        </div>
        <div class="w-full max-w-80 bg-base-100 shadow-2xs px-5 py-5">
          <p class="text-[14px] font-medium text-[#323B49]">Interview</p>
          <h3 class="text-2xl font-bold text-[#10B981]">0</h3>
        </div>
        <div class="w-full m-w-80 bg-base-100 shadow-2xs px-5 py-5">
          <p class="text-[14px] font-medium text-[#323B49] ">Rejected</p>
          <h3 class="text-2xl font-bold text-[#EF4444]" >0</h3>
        </div>
      </div>
    </header>
    <hr class="text-[#E6E7E9] my-[30px] max-w-5xl mx-auto">
    <section></section>
  </body>
</html>
